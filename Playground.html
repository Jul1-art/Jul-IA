<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Jeux Rétro - Jul-IA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background-color: #0c0c0c;
      color: #f0f0f0;
      font-family: 'Press Start 2P', monospace;
      padding: 40px;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 40px;
      color: #00fff7;
      text-shadow: 0 0 6px #00fff7aa;
    }
    .game-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }
    .game-card {
      background: #161616;
      border: 2px solid #00fff766;
      border-radius: 14px;
      padding: 20px;
      width: 240px;
      text-align: center;
      box-shadow: 0 0 12px #00fff722;
      transition: transform 0.3s;
    }
    .game-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 24px #00fff7aa;
    }
    .game-card img {
      max-width: 100%;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .game-title {
      font-size: 1rem;
      margin-bottom: 12px;
      color: #00fff7;
    }
    .play-button {
      background: #00fff7;
      color: #111;
      border: none;
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 8px #00fff744;
      transition: background 0.2s;
    }
    .play-button:hover {
      background: #00bfae;
      color: #fff;
    }
    footer {
      margin-top: 60px;
      text-align: center;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>🎮 Jeux rétro sélectionnés par Jules</h1>

  <div class="game-grid">
    <div class="game-card">
      <img src="assets/pacman_preview.png" alt="Pac-Man">
      <div class="game-title">Pac-Man (1980)</div>
      <button class="play-button" onclick="window.location.href='file:///C:/Users/pefer/Documents/GitHub/Jul-IA/Code_Jul-IA/Jeu/Pac-Man.html'">Jouer</button>
    </div>
    <div class="game-card">
      <img src="assets/pong_preview.png" alt="Pong">
      <div class="game-title">Pong (1972)</div>
      <button class="play-button" onclick="window.location.href='file:///C:/Users/pefer/Documents/GitHub/Jul-IA/Code_Jul-IA/Jeu/Accueil_Pong.html'">Jouer</button>
    </div>
    <div class="game-card">
      <img src="assets/invaders_preview.png" alt="Space Invaders">
      <div class="game-title">Space Invaders (1978)</div>
      <button class="play-button" onclick="window.location.href='file:///C:/Users/pefer/Documents/GitHub/Jul-IA/Code_Jul-IA/Jeu/Space_Invaders.html'">Jouer</button>
    </div>
    <div class="game-card">
      <img src="assets/arkanoid_preview.png" alt="Arkanoid">
      <div class="game-title">Arkanoid (1986)</div>
      <button class="play-button" onclick="window.location.href='file:///C:/.../arkanoid.htmlfile:///C:/Users/pefer/Documents/GitHub/Jul-IA/Code_Jul-IA/Jeu/Arkanoid.html'">Jouer</button>
    </div>
    <div class="game-card">
      <img src="assets/tetris_preview.png" alt="Tetris">
      <div class="game-title">Tetris (1984)</div>
      <button class="play-button" onclick="window.location.href='file:///C:/Users/pefer/Documents/GitHub/Jul-IA/Code_Jul-IA/Jeu/Tetris.html'">Jouer</button>
    </div>
  </div>

  <footer>
    © 2025 – RetroZone by Jules Ferrier
  </footer>

</body>
</html>
